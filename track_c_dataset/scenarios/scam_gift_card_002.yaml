transcript: |
  [scammer, official]
  This is the utility disconnection office. Your power will be shut off today unless the overdue balance is cleared.

  [victim, cautious]
  Can I pay on the company website?

  [scammer, urgent]
  The website is down. Buy prepaid gift cards at the store and read the codes to me before the cutoff time.
